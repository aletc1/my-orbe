name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows Conventional Commits
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?(!)?: .+'; then
            echo "ERROR: PR title does not match Conventional Commits format."
            echo ""
            echo "  Got: $TITLE"
            echo ""
            echo "  Format: <type>[optional scope][!]: <description>"
            echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            echo "  Examples:"
            echo "    feat(web): add dark mode toggle"
            echo "    fix(api): prevent double-enqueue on retry"
            echo "    chore(deps): bump zod to 3.24"
            echo ""
            echo "  See CLAUDE.md §Release process for the full semver mapping."
            exit 1
          fi
          echo "OK: '$TITLE'"

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  docker-smoke:
    if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          load: true
          tags: kyomiru/api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          load: true
          tags: kyomiru/web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
      - name: Build migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/migrate.Dockerfile
          load: true
          tags: kyomiru/migrate:ci
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,scope=migrate,mode=max
      - name: Build landing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/landing.Dockerfile
          load: true
          tags: kyomiru/landing:ci
          cache-from: type=gha,scope=landing
          cache-to: type=gha,scope=landing,mode=max
      - name: Bring up stack
        env:
          KYOMIRU_VERSION: ci
          APP_SECRET_KEY: ${{ secrets.GITHUB_TOKEN && 'dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0' }}
          SESSION_SECRET: dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0
          MOCK_GOOGLE_AUTH_USER: test@example.com
          WEB_ORIGIN: http://localhost:8080
          API_ORIGIN: http://localhost:3000
        run: |
          # Override registry-tagged images with our locally-built ones.
          docker tag kyomiru/api:ci quay.io/kyomiru/api:ci
          docker tag kyomiru/web:ci quay.io/kyomiru/web:ci
          docker tag kyomiru/migrate:ci quay.io/kyomiru/migrate:ci
          cat > .env <<EOF
          KYOMIRU_VERSION=ci
          APP_SECRET_KEY=$APP_SECRET_KEY
          SESSION_SECRET=$SESSION_SECRET
          MOCK_GOOGLE_AUTH_USER=$MOCK_GOOGLE_AUTH_USER
          WEB_ORIGIN=$WEB_ORIGIN
          API_ORIGIN=$API_ORIGIN
          EOF
          docker compose up -d --wait --wait-timeout 120
      - name: Hit /api/healthz through nginx
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/api/healthz; then
              echo "OK"
              exit 0
            fi
            sleep 2
          done
          echo "healthz never became ready" >&2
          docker compose logs --no-color
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v

  chart-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Update chart dependencies
        run: helm dependency update charts/kyomiru
      - name: Lint chart
        run: helm lint charts/kyomiru --strict
      - name: Render default values (bundled Postgres/Redis, mock auth)
        run: |
          helm template kyomiru charts/kyomiru \
            --set host=test.local \
            --set app.mockGoogleAuthUser=test@example.com \
            > /tmp/rendered.yaml
      - name: Assert API probes hit /api/healthz
        run: |
          count=$(grep -c 'path: /api/healthz' /tmp/rendered.yaml || true)
          if [ "$count" -lt 2 ]; then
            echo "Expected liveness+readiness probes at /api/healthz, found $count" >&2
            grep -n 'path:' /tmp/rendered.yaml >&2 || true
            exit 1
          fi
      - name: Render external DB/Redis path
        run: |
          helm template kyomiru charts/kyomiru \
            --set host=test.local \
            --set app.mockGoogleAuthUser=test@example.com \
            --set postgresql.enabled=false \
            --set externalDatabase.url=postgresql://u:p@db.example.com:5432/k \
            --set redis.enabled=false \
            --set externalRedis.url=redis://cache.example.com:6379 \
            > /dev/null
