{{- if not .Values.existingSecret -}}
{{- $secretName := include "kyomiru.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}

{{- /*
APP_SECRET_KEY: use value → preserve existing → generate random.
The app expects a base64 string that decodes to 32 bytes (see secretbox.ts).
randBytes already returns base64; piping through b64enc again is intentional
so the Secret's data field is double-encoded. k8s decodes once on mount,
giving the container env the single-base64 form the app requires.
*/ -}}
{{- $appKey := "" -}}
{{- if .Values.app.appSecretKey -}}
  {{- $appKey = .Values.app.appSecretKey | b64enc -}}
{{- else if and $existing $existing.data (index $existing.data "APP_SECRET_KEY") -}}
  {{- $appKey = index $existing.data "APP_SECRET_KEY" -}}
{{- else -}}
  {{- $appKey = randBytes 32 | b64enc -}}
{{- end -}}

{{- /* SESSION_SECRET: use value → preserve existing → generate random */ -}}
{{- $sessionSecret := "" -}}
{{- if .Values.app.sessionSecret -}}
  {{- $sessionSecret = .Values.app.sessionSecret | b64enc -}}
{{- else if and $existing $existing.data (index $existing.data "SESSION_SECRET") -}}
  {{- $sessionSecret = index $existing.data "SESSION_SECRET" -}}
{{- else -}}
  {{- $sessionSecret = randAlphaNum 64 | b64enc -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kyomiru.labels" . | nindent 4 }}
type: Opaque
data:
  APP_SECRET_KEY: {{ $appKey }}
  SESSION_SECRET: {{ $sessionSecret }}
  {{- if .Values.app.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.app.google.clientId | b64enc }}
  {{- end }}
  {{- if .Values.app.google.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.app.google.clientSecret | b64enc }}
  {{- end }}
  {{- if .Values.app.tmdbApiKey }}
  TMDB_API_KEY: {{ .Values.app.tmdbApiKey | b64enc }}
  {{- end }}
  {{- if .Values.app.sentryDsn }}
  SENTRY_DSN: {{ .Values.app.sentryDsn | b64enc }}
  {{- end }}
  {{- /* Store external connection URLs in the Secret when not delegated to an existing Secret. */ -}}
  {{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.existingSecret) .Values.externalDatabase.url }}
  DATABASE_URL: {{ .Values.externalDatabase.url | b64enc }}
  {{- end }}
  {{- if and (not .Values.redis.enabled) (not .Values.externalRedis.existingSecret) .Values.externalRedis.url }}
  REDIS_URL: {{ .Values.externalRedis.url | b64enc }}
  {{- end }}
{{- end }}
