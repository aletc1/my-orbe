{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kyomiru.fullname" . }}-migrate
  labels:
    {{- include "kyomiru.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # post-install (not pre-install) so the Postgres sub-chart and Secret have
    # already been applied by the time migrations run. pre-upgrade on upgrades
    # so the new api image never starts against an unmigrated schema.
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "kyomiru.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kyomiru.serviceAccountName" . }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              until nc -z -w2 {{ include "kyomiru.fullname" . }}-postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.registry }}/{{ .Values.image.migrate.repository }}:{{ .Values.image.migrate.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "kyomiru.databaseEnv" . | nindent 12 }}
{{- end }}
