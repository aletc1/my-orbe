apiVersion: v1
kind: Service
metadata:
  name: {{ include "kyomiru.fullname" . }}-api
  labels:
    {{- include "kyomiru.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "kyomiru.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
