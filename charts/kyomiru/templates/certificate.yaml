{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer -}}
{{- $certNs := .Release.Namespace -}}
{{- if eq .Values.ingress.className "istio" -}}
{{- $certNs = "istio-system" -}}
{{- end -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tls.secretName }}
  namespace: {{ $certNs }}
  labels:
    {{- include "kyomiru.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  dnsNames:
    - {{ .Values.host | quote }}
  issuerRef:
    name: {{ .Values.ingress.tls.clusterIssuer }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
