name: kyomiru

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kyomiru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kyomiru}
      POSTGRES_DB: ${POSTGRES_DB:-kyomiru}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-kyomiru}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: quay.io/kyomiru/migrate:${KYOMIRU_VERSION:-latest}
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kyomiru}:${POSTGRES_PASSWORD:-kyomiru}@postgres:5432/${POSTGRES_DB:-kyomiru}

  api:
    image: quay.io/kyomiru/api:${KYOMIRU_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kyomiru}:${POSTGRES_PASSWORD:-kyomiru}@postgres:5432/${POSTGRES_DB:-kyomiru}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ['CMD', 'node', '-e', 'fetch("http://localhost:3000/api/healthz").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    image: quay.io/kyomiru/web:${KYOMIRU_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_UPSTREAM: api:3000
    ports:
      - '${KYOMIRU_PORT:-8080}:80'

volumes:
  postgres_data:
  redis_data:
